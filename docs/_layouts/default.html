<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>
      {{ page.title | default: site.title }}{% if page.title and page.title != site.title %} | {{ site.title }}{% endif %}
    </title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <meta name="theme-color" content="#F8F8F3">
    <link rel="icon" type="image/png" href="{{ '/assets/images/rettrack-logo-mark.png' | relative_url }}">
    <link rel="apple-touch-icon" href="{{ '/assets/images/rettrack-logo-mark.png' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>

    <header class="site-header">
      <div class="site-shell header-shell">
        <a class="brand" href="{{ '/' | relative_url }}" aria-label="RetTrack Legal home">
          <img
            class="brand-logo"
            src="{{ '/assets/images/rettrack-logo-mark.png' | relative_url }}"
            alt="RetTrack logo"
            width="48"
            height="48"
          >
          <span class="brand-copy">
            <span class="brand-title">RetTrack Legal</span>
            <span class="brand-subtitle">Official legal documents</span>
          </span>
        </a>

        {% assign current_url = page.url | default: '/' %}
        <nav class="site-nav" aria-label="Legal documents">
          <a
            class="nav-link{% if current_url == '/privacy-policy/' %} is-active{% endif %}"
            href="{{ '/privacy-policy/' | relative_url }}"
            {% if current_url == '/privacy-policy/' %}aria-current="page"{% endif %}
          >Privacy Policy</a>
          <a
            class="nav-link{% if current_url == '/terms-of-use/' %} is-active{% endif %}"
            href="{{ '/terms-of-use/' | relative_url }}"
            {% if current_url == '/terms-of-use/' %}aria-current="page"{% endif %}
          >Terms of Use</a>
        </nav>
      </div>
    </header>

    <main id="main-content" class="site-main">
      <div class="site-shell">
        <article class="content-card">
          {{ content }}
        </article>
      </div>
    </main>

    <footer class="site-footer">
      <div class="site-shell footer-shell">
        <span class="footer-brand">RetTrack</span>
        <a href="mailto:rettrackapp@gmail.com">rettrackapp@gmail.com</a>
        <span>Public legal documents.</span>
      </div>
    </footer>
  </body>
</html>
